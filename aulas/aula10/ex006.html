<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventos DOM</title>
    <style>
      div#area {
        background-color: rgb(7, 53, 7);
        font:
          normal normal 1.5em Arial,
          Helvetica,
          sans-serif;
        color: white;
        width: 200px;
        height: 200px;
        line-height: 200px;
        text-align: center;
        border-radius: 15px;
      }
    </style>
  </head>
  <body>
    <div id="area">Interaja...</div>

    <script>
      let area = window.document.getElementById('area');
      area.addEventListener('click', clicar);
      area.addEventListener('mouseenter', entrar);
      area.addEventListener('mouseout', sair);

      function clicar() {
        area.innerText = 'Clicou!';
        area.style.backgroundColor = 'red';
      }
      function entrar() {
        area.innerHTML = 'Entrou!';
      }
      function sair() {
        area.innerHTML = 'Saiu!';
        area.style.background = 'rgb(7, 53, 7)';
      }
    </script>
  </body>
</html>
