<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primeiro Script</title>
    <style>
      body {
        /* Comentário em CSS */
        background-color: #d4efff;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 1.5em;
      }
      h1 {
        font-variant: small-caps;
      }
    </style>
  </head>
  <body>
    <h1>Olá, mundo!</h1>
    <!-- Comentário em HTML -->
    <p>
      Já me livrei da
      <strong style="color: red">maldição</strong>
      !
    </p>

    <script>
      // Number + Number = para adição
      // String + String = para concatenação

      let nome = window.prompt('Qual é seu nome?').toString(); // Recebe String
      let n1 = Number(window.prompt('Digite um número:')); // Recebe String
      let n2 = Number(window.prompt('Digite outro número:')); // Recebe String
      let soma = n1 + n2;
      window.alert(`A soma entre ${n1} e ${n2} é igual a ${soma}`); // Template String
    </script>
  </body>
</html>
