<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primeiro Script</title>
    <style>
      body {
        /* Comentário em CSS */
        background-color: #d4efff;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 1.5em;
      }
      h1 {
        font-variant: small-caps;
      }
    </style>
  </head>
  <body>
    <h1>Olá, mundo!</h1>
    <!-- Comentário em HTML -->
    <p>
      Já me livrei da
      <strong style="color: red">maldição</strong>
      !
    </p>

    <script>
      let nome = window.prompt('Qual é seu nome?'); // Vai perguntar o nome...
      window.alert('Seja bem-vindo(a), ' + nome + '!'); // Concatenação
    </script>
  </body>
</html>
